<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
 
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <title>Frontend Mentor | Product preview card component</title>
  <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Montserrat:wght@500;700&display=swap%22
      rel="stylesheet"
    />
</head>
 
<body>
 
 <main class="container">
      <article class="card">
        <div class="card-obrazek">
          <img
            src="images/image-product-desktop.jpg"
            alt="Gabrielle Essence Eau De Parfum"
          />
        </div>
 
        <div class="card-celek">
          <p class="mininapis">Perfume</p>
 
          <h1 class="nazev">
            Gabrielle <br />
            Essence Eau <br />
            De Parfum
          </h1>
 
          <p class="velkejtext">
            A floral, solar and voluptuous interpretation composed by Olivier
            Polge, Perfumer-Creator for the House of CHANEL.
          </p>
 
          <div class="ceny">
            <span class="cena1">$149.99</span>
            <span class="cena2">$169.99</span>
          </div>
 
          <button class="tlacitko">
            <img src="images/icon-cart.svg" alt="" />
            Add to Cart
          </button>
        </div>
      </article>
    </main>
</body>
</html>
